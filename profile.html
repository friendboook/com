<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendBook - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #000a05; color: #ffffff; }

        header {
            background-color: #01160b;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #0a2e1a;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        .back-btn { color: #ffffff; font-size: 20px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .back-btn:hover { color: #2ecc71; }
        .logo { color: #2ecc71; font-size: 20px; font-weight: bold; }

        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #01160b;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            border: 1px solid #0a2e1a;
            padding-bottom: 20px;
        }

        .cover-photo {
            width: 100%;
            height: 220px;
            background-color: #022112; 
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* কভার বাটন ফিক্স */
        .edit-cover-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 100; /* যেন বাটনটি সবার উপরে থাকে */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-header {
            position: relative;
            padding: 0 20px;
            margin-top: -60px; 
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 50;
        }

        .profile-pic-container { position: relative; width: 130px; height: 130px; }
        .profile-pic {
            width: 100%; height: 100%; border-radius: 50%;
            border: 5px solid #01160b; background-color: #2ecc71;
            object-fit: cover; display: flex; justify-content: center;
            align-items: center; font-size: 45px; color: #000a05; font-weight: bold;
            overflow: hidden;
        }
        .profile-pic img { width: 100%; height: 100%; object-fit: cover; }

        .edit-profile-btn {
            position: absolute; bottom: 8px; right: 8px;
            background-color: #3a3b3c; color: white; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; border: 2px solid #01160b;
            z-index: 60;
        }

        .profile-name { margin-top: 10px; font-size: 26px; font-weight: bold; color: #ffffff; }
        input[type="file"] { display: none; }
        #upload-status { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.9); padding: 10px 20px; border-radius: 30px;
            color: white; font-weight: bold; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <header>
        <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> হোম</a>
        <div class="logo">প্রোফাইল</div>
    </header>

    <div class="profile-container">
        <div class="cover-photo" id="coverPhotoDisplay">
            <label for="coverUpload" class="edit-cover-btn">
                <i class="fa-solid fa-camera"></i> কভার ছবি পরিবর্তন
            </label>
            <input type="file" id="coverUpload" accept="image/*">
        </div>

        <div class="profile-header">
            <div class="profile-pic-container">
                <div class="profile-pic" id="profilePicDisplay">U</div>
                <label for="profileUpload" class="edit-profile-btn">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="profileUpload" accept="image/*">
            </div>
            <div class="profile-name" id="userNameDisplay">লোড হচ্ছে...</div>
        </div>
    </div>

    <div id="upload-status">ছবি আপলোড হচ্ছে...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaVLWhU_R3Pdqvm_DgG7cEI9n488xqFr4",
            authDomain: "friendbook-e9569.firebaseapp.com",
            projectId: "friendbook-e9569",
            storageBucket: "friendbook-e9569.firebasestorage.app",
            messagingSenderId: "459682436919",
            appId: "1:459682436919:web:fadd189936f5ae73ec6cb2",
            measurementId: "G-CQCWVWTW5W"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const IMGBB_API_KEY = "9f5aeefecfb7dcb8325725caa75734a0";
        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    document.getElementById('userNameDisplay').innerText = userData.displayName;
                    if (userData.profilePic) {
                        document.getElementById('profilePicDisplay').innerHTML = `<img src="${userData.profilePic}">`;
                    } else {
                        document.getElementById('profilePicDisplay').innerText = userData.displayName.charAt(0);
                    }
                    if (userData.coverPic) {
                        document.getElementById('coverPhotoDisplay').style.backgroundImage = `url(${userData.coverPic})`;
                    }
                }
            } else { window.location.href = "index.html"; }
        });

        async function uploadImage(file, type) {
            if (!file) return;
            const statusText = document.getElementById('upload-status');
            statusText.style.display = 'block';
            statusText.innerText = "ছবি আপলোড হচ্ছে, অপেক্ষা করুন...";
            
            const formData = new FormData();
            formData.append("image", file);
            formData.append("key", IMGBB_API_KEY);
            
            try {
                const response = await fetch("https://api.imgbb.com/1/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();

                if(data.success) {
                    const imageUrl = data.data.display_url;
                    const userRef = doc(db, "users", currentUser.uid);
                    
                    if (type === 'profile') {
                        await updateDoc(userRef, { profilePic: imageUrl });
                        document.getElementById('profilePicDisplay').innerHTML = `<img src="${imageUrl}">`;
                    } else if (type === 'cover') {
                        await updateDoc(userRef, { coverPic: imageUrl });
                        document.getElementById('coverPhotoDisplay').style.backgroundImage = `url(${imageUrl})`;
                    }
                    statusText.innerText = "সফলভাবে আপলোড হয়েছে!";
                    setTimeout(() => { statusText.style.display = 'none'; }, 2000);
                }
            } catch (error) {
                statusText.innerText = "আপলোড ব্যর্থ হয়েছে!";
                setTimeout(() => { statusText.style.display = 'none'; }, 3000);
            }
        }

        // ইভেন্ট লিসেনারগুলো পুনরায় নিশ্চিত করা হলো
        document.getElementById('profileUpload').addEventListener('change', (e) => {
            if (e.target.files.length > 0) uploadImage(e.target.files[0], 'profile');
        });
        
        document.getElementById('coverUpload').addEventListener('change', (e) => {
            if (e.target.files.length > 0) uploadImage(e.target.files[0], 'cover');
        });
    </script>
</body>
</html>
