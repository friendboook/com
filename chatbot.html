<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FriendBot - AI Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Header Styling */
        header { 
            background-color: #01160b; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid #0a2e1a; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            z-index: 10;
        }
        .back-btn { color: #ffffff; font-size: 20px; cursor: pointer; transition: 0.2s;}
        .back-btn:active { transform: scale(0.9); color: #2ecc71;}
        
        .bot-avatar { 
            width: 42px; height: 42px; 
            background: linear-gradient(135deg, #2ecc71, #1a8c4b); 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 20px; color: #01160b; 
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
        }
        
        .header-info h2 { font-size: 18px; color: #2ecc71; font-weight: bold; letter-spacing: -0.5px;}
        .header-info p { font-size: 12px; color: #8c9e94; display: flex; align-items: center; gap: 5px; margin-top: 2px;}
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        /* Chat Area */
        .chat-box { 
            flex: 1; 
            padding: 15px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-thumb { background: #0a2e1a; border-radius: 10px; }

        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14.5px; 
            line-height: 1.5; 
            word-wrap: break-word; 
            animation: slideUp 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg { 
            background: #2ecc71; 
            color: #01160b; 
            font-weight: 500;
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
        }

        .bot-msg { 
            background: #022112; 
            color: #e4e6eb; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
            border: 1px solid #0a2e1a;
        }

        /* Typing Indicator */
        .typing-indicator { display: flex; align-items: center; gap: 5px; padding: 5px; }
        .typing-dot { width: 6px; height: 6px; background: #2ecc71; border-radius: 50%; animation: typingWave 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typingWave {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Input Area */
        .input-area { 
            background: #01160b; 
            padding: 12px 15px; 
            border-top: 1px solid #0a2e1a; 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }

        .input-wrapper { 
            flex: 1; 
            background: #022112; 
            border-radius: 25px; 
            border: 1px solid #0f4024; 
            padding: 5px 15px; 
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: #2ecc71; }

        input { 
            background: transparent; 
            border: none; 
            color: #ffffff; 
            font-size: 15px; 
            width: 100%; 
            outline: none; 
            padding: 8px 0;
        }
        input::placeholder { color: #8c9e94; }

        .send-btn { 
            background: #2ecc71; 
            color: #01160b; 
            border: none; 
            width: 42px; height: 42px; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .send-btn:active { transform: scale(0.9); }
        .send-btn:disabled { background: #0a2e1a; color: #8c9e94; box-shadow: none; cursor: not-allowed;}
    </style>
</head>

        ];

        // --- Logic Functions ---

        function cleanText(text) {
            return text.toLowerCase().replace(/[?.,!।]/g, "").trim();
        }

        // Dynamic Time Function
        function getDynamicTimeResponse(cleanedText) {
            if (cleanedText.includes("কয়টা বাজে") || cleanedText.includes("সময় কত") || cleanedText.includes("time") || cleanedText.includes("time koto") || cleanedText.includes("কোয়টা বাজে")) {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; 
                minutes = minutes < 10 ? '0' + minutes : minutes;
                return `এখন সময় <b>${hours}:${minutes} ${ampm}</b> ⏰`;
            }
            return null;
        }

        function findBestResponse(userText) {
            const cleanedText = cleanText(userText);

            // 1. Check for dynamic queries (like Time)
            const dynamicTime = getDynamicTimeResponse(cleanedText);
            if (dynamicTime) return dynamicTime;

            // 2. Regular Intent Matching
            let bestMatchCategory = null;
            let highestScore = 0;

            for (let intent of intents) {
                let score = 0;
                for (let keyword of intent.keywords) {
                    const regex = new RegExp(`\\b${keyword}\\b`, 'g');
                    if (regex.test(cleanedText)) {
                        score += 3; // Exact match heavily weighted
                    } else if (cleanedText.includes(keyword)) {
                        score += 1; // Partial match
                    }
                }

                if (score > highestScore) {
                    highestScore = score;
                    bestMatchCategory = intent;
                }
            }

            if (highestScore > 0) {
                const responses = bestMatchCategory.responses;
                return responses[Math.floor(Math.random() * responses.length)];
            } else {
                return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
            }
        }

        // --- UI Functions ---

        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${isUser ? 'user-msg' : 'bot-msg'}`;
            
            if (isUser) {
                msgDiv.innerText = text;
            } else {
                msgDiv.innerHTML = text; // Allow HTML formatting for bot
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement("div");
            typingDiv.className = "message bot-msg";
            typingDiv.id = "typingIndicator";
            typingDiv.style.width = "fit-content";
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById("typingIndicator");
            if (indicator) indicator.remove();
        }

        // --- Main Execution ---

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // User Message
            appendMessage(text, true);
            userInput.value = "";
            sendBtn.disabled = true;

            // Generate Bot Response
            const botResponse = findBestResponse(text);

            // Typing Animation
            showTypingIndicator();

            // Dynamic delay based on length of response
            const readingDelay = Math.min(Math.max(text.length * 20, 600), 1500); 
            
            setTimeout(() => {
                removeTypingIndicator();
                
                const msgDiv = document.createElement("div");
                msgDiv.className = "message bot-msg";
                chatBox.appendChild(msgDiv);
                
                msgDiv.innerHTML = botResponse; 
                chatBox.scrollTop = chatBox.scrollHeight;
                
                sendBtn.disabled = false;
                userInput.focus();
                
            }, readingDelay);
        }

        // Handle Enter key
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                handleSend();
            }
        });

    </script>
</body>
</html>
