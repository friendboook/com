<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FriendBook - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000a05; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000a05;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }
        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* গোল সেপ */
            object-fit: cover;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }
        .from-green {
            position: absolute;
            bottom: 50px;
            color: #2ecc71;
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* --- Login Container --- */
        #login-content {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            display: none; 
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* লগইন পেজের গোল লোগো */
        .login-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid #2ecc71;
            display: inline-block;
        }

        .logo-text { color: #2ecc71; font-size: 45px; font-weight: 800; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #0f4024;
            background-color: #022112;
            color: #ffffff;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.2); }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:active { transform: scale(0.98); }

        .divider { height: 1px; background-color: #0a2e1a; margin: 30px 0; position: relative; }
        .divider::after { content: 'অথবা'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background-color: #000a05; padding: 0 15px; color: #8c9e94; font-size: 14px; }

        .signup-link {
            display: inline-block;
            margin-top: 10px;
            color: #2ecc71;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #2ecc71;
            padding: 10px 30px;
            border-radius: 10px;
            transition: 0.3s;
        }
        .signup-link:hover { background-color: #2ecc71; color: #000a05; }

        #error-msg { color: #ff4757; font-size: 14px; margin-top: 10px; display: none; }

        .app-dl { margin-top: 40px; color: #8c9e94; font-size: 13px; }
        .app-dl a { color: #ffffff; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://raw.githubusercontent.com/friendboook/com/refs/heads/main/Picsart_26-04-17_14-56-52-632.png" class="splash-logo">
        <div class="from-green">FriendBook</div>
    </div>

    <div id="login-content">
        <img src="https://raw.githubusercontent.com/friendboook/com/refs/heads/main/Picsart_26-04-17_14-56-52-632.png" class="login-logo">
        <div class="logo-text">FriendBook</div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="ইমেইল অ্যাড্রেস" required autocomplete="email">
            <input type="password" id="password" placeholder="পাসওয়ার্ড" required autocomplete="current-password">
            <button type="submit" class="login-btn" id="loginBtn">লগ ইন করুন</button>
            <div id="error-msg">ইমেইল বা পাসওয়ার্ড ভুল!</div>
        </form>

        <div class="divider"></div>
        <a href="signup.html" class="signup-link">নতুন অ্যাকাউন্ট খুলুন</a>

        <div class="app-dl">
            <p>সেরা অভিজ্ঞতার জন্য অ্যাপটি ব্যবহার করুন</p>
            <a href="FriendBook.apk"><i class="fa-brands fa-android" style="font-size: 20px;"></i> Download APK</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaVLWhU_R3Pdqvm_DgG7cEI9n488xqFr4",
            authDomain: "friendbook-e9569.firebaseapp.com",
            projectId: "friendbook-e9569",
            storageBucket: "friendbook-e9569.firebasestorage.app",
            messagingSenderId: "459682436919",
            appId: "1:459682436919:web:fadd189936f5ae73ec6cb2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setTimeout(() => { window.location.href = "home.html"; }, 2500);
            } else {
                setTimeout(() => {
                    const splash = document.getElementById('splash-screen');
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.display = 'none';
                        document.getElementById('login-content').style.display = 'block';
                    }, 800);
                }, 2500);
            }
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('error-msg');

            btn.innerText = "অপেক্ষা করুন...";
            btn.disabled = true;
            error.style.display = 'none';

            try {
                await setPersistence(auth, browserLocalPersistence);
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "home.html";
            } catch (err) {
                btn.innerText = "লগ ইন করুন";
                btn.disabled = false;
                error.style.display = 'block';
            }
        };
    </script>
</body>
</html>
