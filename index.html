<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendBook - Login or Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000a05; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .login-container { max-width: 400px; width: 100%; margin-top: 50px; background-color: #01160b; padding: 30px; border-radius: 12px; border: 1px solid #0a2e1a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        .logo { color: #2ecc71; font-size: 40px; font-weight: 800; margin-bottom: 10px; text-decoration: none; display: block; }
        .subtitle { color: #8c9e94; font-size: 16px; margin-bottom: 30px; }
        
        input { width: 100%; padding: 14px 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #0f4024; background-color: #022112; color: #ffffff; outline: none; font-size: 16px; }
        input:focus { border-color: #2ecc71; }
        
        .login-btn { width: 100%; padding: 14px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background-color: #2ecc71; }
        
        .divider { height: 1px; background-color: #0a2e1a; margin: 25px 0; position: relative; }
        .divider::before { content: 'অথবা'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background-color: #01160b; padding: 0 10px; color: #8c9e94; font-size: 14px; }
        
        .signup-btn { background-color: transparent; color: #2ecc71; border: 1px solid #2ecc71; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; transition: 0.3s; }
        .signup-btn:hover { background-color: #2ecc71; color: #01160b; }

        /* --- ডাউনলোড বাটন স্টাইল --- */
        .download-section { margin-top: 40px; text-align: center; width: 100%; max-width: 400px; }
        .download-card { background: linear-gradient(145deg, #022112, #01160b); border: 1px dashed #2ecc71; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .download-text { font-size: 14px; color: #8c9e94; font-weight: 500; }
        
        .app-download-btn { background-color: #ffffff; color: #000000; padding: 12px 24px; border-radius: 50px; text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 700; transition: 0.3s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2); }
        .app-download-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4); background-color: #2ecc71; color: #ffffff; }
        .app-download-btn i { font-size: 24px; }
        
        #error-msg { color: #e41e3f; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="logo">FriendBook</a>
        <p class="subtitle">সবুজ মিয়ার সোশ্যাল মিডিয়ায় আপনাকে স্বাগতম</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="ইমেইল অ্যাড্রেস" required>
            <input type="password" id="password" placeholder="পাসওয়ার্ড" required>
            <button type="submit" class="login-btn">লগ ইন করুন</button>
            <div id="error-msg">ভুল ইমেইল বা পাসওয়ার্ড!</div>
        </form>
        
        <div class="divider"></div>
        
        <a href="signup.html" class="signup-btn">নতুন অ্যাকাউন্ট তৈরি করুন</a>
    </div>

    <div class="download-section">
        <div class="download-card">
            <p class="download-text">সেরা অভিজ্ঞতার জন্য আমাদের অ্যাপটি নামিয়ে নিন</p>
            
            <a href="FriendBook.apk" class="app-download-btn">
                <i class="fa-brands fa-android"></i>
                <span>Download Android App</span>
            </a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaVLWhU_R3Pdqvm_DgG7cEI9n488xqFr4",
            authDomain: "friendbook-e9569.firebaseapp.com",
            projectId: "friendbook-e9569",
            storageBucket: "friendbook-e9569.firebasestorage.app",
            messagingSenderId: "459682436919",
            appId: "1:459682436919:web:fadd189936f5ae73ec6cb2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "home.html";
            } catch (error) {
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
