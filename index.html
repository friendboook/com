<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FriendBook - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow: hidden; }
        
        /* --- NEW: Splash Screen Animation --- */
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #01160b; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }
        
        .splash-logo {
            width: 85px; height: 85px; border-radius: 50%; object-fit: cover;
            margin-bottom: 40px; border: 2px solid #0a2e1a;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.2);
            animation: floatLogo 3s ease-in-out infinite;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loading-dots { display: flex; gap: 10px; }
        .dot {
            width: 12px; height: 12px; border-radius: 50%; background-color: #ffffff;
            animation: pulseGreen 1.5s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        .dot:nth-child(4) { animation-delay: 0.6s; }
        .dot:nth-child(5) { animation-delay: 0.8s; }

        @keyframes pulseGreen {
            0%, 100% { background-color: #ffffff; transform: scale(1); box-shadow: none; }
            50% { background-color: #2ecc71; transform: scale(1.3); box-shadow: 0 0 10px rgba(46, 204, 113, 0.8); }
        }

        /* --- Auth Container Styles --- */
        .auth-container { background: #01160b; border: 1px solid #0a2e1a; border-radius: 16px; padding: 30px 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; display: none; opacity: 0; animation: fadeIn 0.5s forwards; }
        
        @keyframes fadeIn { to { opacity: 1; } }

        .logo-area { margin-bottom: 30px; }
        .logo-area img { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 1px solid #0a2e1a; }
        .logo-title { font-size: 28px; font-weight: 800; color: #2ecc71; letter-spacing: -0.5px; }
        .subtitle { color: #8c9e94; font-size: 14px; margin-top: 5px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; color: #b0b3b8; font-size: 13px; margin-bottom: 5px; font-weight: bold; padding-left: 5px;}
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #8c9e94; font-size: 16px; }
        .input-group input { width: 100%; background: #022112; border: 1px solid #0f4024; color: white; padding: 14px 15px 14px 45px; border-radius: 30px; font-family: inherit; font-size: 15px; outline: none; transition: 0.3s;}
        .input-group input:focus { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.2); }

        .primary-btn { width: 100%; background: #2ecc71; color: #01160b; border: none; padding: 14px; border-radius: 30px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);}
        .primary-btn:active { transform: scale(0.98); }
        .primary-btn:disabled { background: #1a5c38; color: #8c9e94; cursor: not-allowed; box-shadow: none; }

        .switch-auth { margin-top: 20px; font-size: 14px; color: #b0b3b8; }
        .switch-auth span { color: #2ecc71; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .switch-auth span:hover { text-decoration: underline; }

        .error-msg { color: #ff4757; font-size: 13px; margin-bottom: 15px; display: none; background: rgba(255, 71, 87, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 71, 87, 0.3); }

        /* General Loader Overlay */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 5000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { font-size: 40px; color: #2ecc71; margin-bottom: 15px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: white; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="splash-screen" id="splashScreen">
        <img src="icon.png" alt="FriendBook" class="splash-logo" onerror="this.style.display='none'">
        <div class="loading-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <i class="fa-solid fa-circle-notch spinner"></i>
        <div class="loading-text" id="loadingText">অপেক্ষা করুন...</div>
    </div>

    <div class="auth-container" id="loginBox">
        <div class="logo-area">
            <img src="icon.png" alt="FriendBook Logo" onerror="this.style.display='none'">
            <div class="logo-title">FriendBook</div>
            <div class="subtitle">আমাদের নিজস্ব সোশ্যাল নেটওয়ার্ক</div>
        </div>

        <div class="error-msg" id="loginError"></div>

        <div class="input-group">
            <label>ইমেইল (Email)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="আপনার ইমেইল দিন">
            </div>
        </div>

        <div class="input-group">
            <label>পাসওয়ার্ড (Password)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ড দিন">
            </div>
        </div>

        <button class="primary-btn" id="loginBtn">লগইন করুন</button>

        <div class="switch-auth">
            অ্যাকাউন্ট নেই? <span onclick="switchForm('signup')">নতুন অ্যাকাউন্ট খুলুন</span>
        </div>
    </div>

    <div class="auth-container" id="signupBox">
        <div class="logo-area">
            <img src="icon.png" alt="FriendBook Logo" onerror="this.style.display='none'">
            <div class="logo-title">অ্যাকাউন্ট তৈরি করুন</div>
            <div class="subtitle">আমাদের নিজস্ব সোশ্যাল নেটওয়ার্ক</div>
        </div>

        <div class="error-msg" id="signupError"></div>

        <div class="input-group">
            <label>আপনার নাম (Full Name)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="signupName" placeholder="আপনার পুরো নাম দিন">
            </div>
        </div>

        <div class="input-group">
            <label>ইমেইল (Email)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="signupEmail" placeholder="আপনার ইমেইল দিন">
            </div>
        </div>

        <div class="input-group">
            <label>পাসওয়ার্ড (Password)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="signupPassword" placeholder="কমপক্ষে ৬ অক্ষরের পাসওয়ার্ড">
            </div>
        </div>

        <button class="primary-btn" id="signupBtn">সাইনআপ করুন</button>

        <div class="switch-auth">
            আগে থেকেই অ্যাকাউন্ট আছে? <span onclick="switchForm('login')">লগইন করুন</span>
        </div>
    </div>

    <script>
        function switchForm(formType) {
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('signupError').style.display = 'none';
            
            if(formType === 'signup') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('signupBox').style.display = 'block';
            } else {
                document.getElementById('signupBox').style.display = 'none';
                document.getElementById('loginBox').style.display = 'block';
            }
        }

        function showError(elementId, msg) {
            const el = document.getElementById(elementId);
            el.innerText = msg;
            el.style.display = 'block';
        }

        function showLoader(text) {
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingOverlay').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCaVLWhU_R3Pdqvm_DgG7cEI9n488xqFr4", 
            authDomain: "friendbook-e9569.firebaseapp.com", 
            projectId: "friendbook-e9569", 
            storageBucket: "friendbook-e9569.firebasestorage.app", 
            messagingSenderId: "459682436919", 
            appId: "1:459682436919:web:fadd189936f5ae73ec6cb2" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        // --- Splash Screen & Auto-Login Logic ---
        let authDetermined = false;
        let isUserLoggedIn = false;
        let splashTimeFinished = false;

        // Minimum 2.5 seconds showing the splash screen for cool effect
        setTimeout(() => {
            splashTimeFinished = true;
            processRedirect();
        }, 2500);

        // Firebase Auth listener checks session automatically
        onAuthStateChanged(auth, (user) => {
            authDetermined = true;
            isUserLoggedIn = !!user;
            processRedirect();
        });

        function processRedirect() {
            // Only proceed if both the splash animation time is done AND Firebase told us the login status
            if (splashTimeFinished && authDetermined) {
                if (isUserLoggedIn) {
                    // Auto-Login: User is already saved, go directly to home!
                    window.location.href = "home.html";
                } else {
                    // Not logged in: Hide splash screen and show login box
                    const splash = document.getElementById('splashScreen');
                    splash.style.opacity = '0';
                    splash.style.visibility = 'hidden';
                    
                    setTimeout(() => {
                        splash.style.display = 'none';
                        document.body.style.overflow = 'auto'; // allow scrolling if needed
                        document.getElementById('loginBox').style.display = 'block';
                    }, 600); // Wait for CSS fade out transition
                }
            }
        }

        // LOGIN LOGIC
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            
            document.getElementById('loginError').style.display = 'none';

            if (!email || !pass) {
                showError('loginError', 'দয়া করে ইমেইল এবং পাসওয়ার্ড দিন!');
                return;
            }

            showLoader('লগইন হচ্ছে...');
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "home.html";
            } catch (error) {
                hideLoader();
                let errMsg = "লগইন ব্যর্থ হয়েছে! ইমেইল বা পাসওয়ার্ড ভুল।";
                if(error.code === 'auth/user-not-found') errMsg = "এই ইমেইলে কোনো অ্যাকাউন্ট পাওয়া যায়নি!";
                if(error.code === 'auth/wrong-password') errMsg = "পাসওয়ার্ড ভুল হয়েছে!";
                if(error.code === 'auth/invalid-email') errMsg = "ইমেইল এর ফরম্যাট ঠিক নেই!";
                showError('loginError', errMsg);
            }
        });

        // SIGNUP LOGIC
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPassword').value.trim();
            
            document.getElementById('signupError').style.display = 'none';

            if (!name || !email || !pass) {
                showError('signupError', 'সবগুলো ঘর পূরণ করা আবশ্যক!');
                return;
            }
            if (pass.length < 6) {
                showError('signupError', 'পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!');
                return;
            }

            showLoader('অ্যাকাউন্ট তৈরি হচ্ছে...');
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Save user profile data in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    profilePic: "",
                    coverPic: "",
                    bio: "",
                    followers: [],
                    following: [],
                    friends: [],
                    sentRequests: [],
                    receivedRequests: [],
                    createdAt: serverTimestamp()
                });

                window.location.href = "home.html";
            } catch (error) {
                hideLoader();
                let errMsg = "অ্যাকাউন্ট তৈরি করতে সমস্যা হয়েছে!";
                if(error.code === 'auth/email-already-in-use') errMsg = "এই ইমেইল দিয়ে আগে থেকেই অ্যাকাউন্ট আছে!";
                if(error.code === 'auth/invalid-email') errMsg = "ইমেইল এর ফরম্যাট ঠিক নেই!";
                showError('signupError', errMsg);
            }
        });
    </script>
</body>
</html>
