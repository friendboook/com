<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FriendBook - Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background-color: #000a05; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }
        header { background-color: #01160b; border-bottom: 1px solid #0a2e1a; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 10; }
        .back-btn { color: #ffffff; font-size: 20px; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .logo { color: #2ecc71; font-size: 20px; font-weight: bold; }
        
        .nav-badge { position: absolute; top: -5px; right: -10px; background-color: #e41e3f; color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 50px; border: 2px solid #01160b; display: none; }

        .chat-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .user-list-sidebar { width: 100%; height: 100%; background-color: #01160b; border-right: 1px solid #0a2e1a; overflow-y: auto; transition: 0.3s; }
        .user-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid rgba(10, 46, 26, 0.5); transition: 0.2s; }
        .user-item:hover { background-color: rgba(46, 204, 113, 0.1); }
        .avatar-wrapper { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .chat-avatar { width: 100%; height: 100%; border-radius: 50%; background-color: #2ecc71; display: flex; justify-content: center; align-items: center; color: #01160b; font-weight: bold; font-size: 20px; overflow: hidden; border: 2px solid #01160b; }
        .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; background-color: #31a24c; border-radius: 50%; border: 2px solid #01160b; display: none; }
        .online-dot.active { display: block; }
        .user-info { flex-grow: 1; }
        .user-name { font-size: 16px; font-weight: 600; color: #ffffff; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .last-msg { font-size: 13px; color: #8c9e94; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; transition: 0.2s; }
        
        .chat-box-area { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background-color: #000a05; display: flex; flex-direction: column; transition: 0.3s; z-index: 20; }
        .chat-box-area.active { left: 0; }
        .chat-header { background-color: #01160b; padding: 12px 16px; border-bottom: 1px solid #0a2e1a; display: flex; align-items: center; gap: 15px; }
        .close-chat-btn { color: #2ecc71; font-size: 20px; cursor: pointer; padding: 5px; }
        .messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .msg-received { background-color: #1a1a1a; color: #e4e6eb; border-bottom-left-radius: 5px; align-self: flex-start; border: 1px solid #0a2e1a; }
        .msg-sent { background-color: #27ae60; color: #ffffff; border-bottom-right-radius: 5px; align-self: flex-end; }
        .msg-image { max-width: 200px; border-radius: 12px; cursor: pointer; border: 1px solid #0a2e1a; }
        .msg-sent .msg-image { border: 2px solid #27ae60; }
        .chat-input-area { background-color: #01160b; padding: 12px 15px; border-top: 1px solid #0a2e1a; display: flex; align-items: center; gap: 10px; }
        .media-btn { color: #2ecc71; font-size: 22px; cursor: pointer; }
        .chat-input { flex-grow: 1; background-color: #022112; border: 1px solid #0f4024; color: white; padding: 12px 15px; border-radius: 25px; outline: none; font-size: 15px; }
        .send-btn { color: #2ecc71; font-size: 22px; cursor: pointer; background: none; border: none; outline: none; }
        
        #upload-status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(46, 204, 113, 0.9); padding: 10px 20px; border-radius: 30px; color: white; font-weight: bold; display: none; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        @media (min-width: 768px) { .user-list-sidebar { width: 350px; border-right: 1px solid #0a2e1a; } .chat-box-area { position: static; flex: 1; left: 0; } .close-chat-btn { display: none; } }
    </style>
</head>
<body>

    <header>
        <a href="home.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> হোম</a>
        <div style="position: relative;">
            <i class="fa-solid fa-comment-dots" style="font-size: 20px; color: #2ecc71;"></i>
            <span class="nav-badge" id="msg-badge-header">0</span>
        </div>
    </header>

    <div class="chat-container">
        <div class="user-list-sidebar" id="userList">
            <div style="padding: 20px; text-align: center; color: #8c9e94;">লোড হচ্ছে...</div>
        </div>

        <div class="chat-box-area" id="chatBox">
            <div class="chat-header">
                <i class="fa-solid fa-arrow-left close-chat-btn" id="closeChatBtn"></i>
                <div class="avatar-wrapper" style="width: 40px; height: 40px;">
                    <div class="chat-avatar" id="activeChatAvatar">U</div>
                    <div class="online-dot active" id="activeChatOnlineStatus"></div>
                </div>
                <div class="user-info">
                    <div class="user-name" id="activeChatName">Select a user</div>
                    <div class="last-msg" id="activeChatStatus" style="color: #2ecc71; font-size: 12px;">Active now</div>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer">
                <div style="text-align: center; color: #8c9e94; margin-top: 50px;">চ্যাট শুরু করতে বাম পাশ থেকে একজন ইউজার সিলেক্ট করুন।</div>
            </div>

            <div class="chat-input-area">
                <label for="chatImageUpload"><i class="fa-solid fa-image media-btn" title="Send Image"></i></label>
                <input type="file" id="chatImageUpload" accept="image/*" style="display: none;">
                <input type="text" class="chat-input" id="messageInput" placeholder="মেসেজ লিখুন...">
                <button class="send-btn" id="sendMessageBtn"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    
    <div id="upload-status">ছবি পাঠানো হচ্ছে...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCaVLWhU_R3Pdqvm_DgG7cEI9n488xqFr4",
            authDomain: "friendbook-e9569.firebaseapp.com",
            projectId: "friendbook-e9569",
            storageBucket: "friendbook-e9569.firebasestorage.app",
            messagingSenderId: "459682436919",
            appId: "1:459682436919:web:fadd189936f5ae73ec6cb2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const IMGBB_API_KEY = "9f5aeefecfb7dcb8325725caa75734a0";

        let currentUser = null, activeChatUserId = null, unsubscribeMessages = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                await setDoc(doc(db, "users", user.uid), { isOnline: true, lastActive: serverTimestamp() }, { merge: true });
                window.addEventListener("beforeunload", () => { updateDoc(doc(db, "users", currentUser.uid), { isOnline: false }).catch(e=>console.log(e)); });
                loadUserList();
            } else { window.location.href = "index.html"; }
        });

        function loadUserList() {
            const q = query(collection(db, "users"));
            onSnapshot(q, (snapshot) => {
                const userListDiv = document.getElementById('userList');
                userListDiv.innerHTML = "";
                let hasOtherUsers = false;
                let myUnreadData = {};

                // প্রথমে নিজের আনরিড কাউন্ট খুঁজে বের করা
                snapshot.forEach((docSnap) => {
                    if (docSnap.id === currentUser.uid) {
                        myUnreadData = docSnap.data().unreadCounts || {};
                        let totalUnread = 0;
                        for(let k in myUnreadData) totalUnread += myUnreadData[k];
                        const headerBadge = document.getElementById('msg-badge-header');
                        if (totalUnread > 0) {
                            headerBadge.innerText = totalUnread > 9 ? '9+' : totalUnread;
                            headerBadge.style.display = 'block';
                        } else {
                            headerBadge.style.display = 'none';
                        }
                    }
                });

                // এবার বাকি ইউজারদের লিস্ট দেখানো
                snapshot.forEach((docSnap) => {
                    const user = docSnap.data();
                    const userId = docSnap.id; 
                    
                    if(userId !== currentUser.uid) { 
                        hasOtherUsers = true;
                        const dName = user.displayName || "New User";
                        const avatar = user.profilePic ? `<img src="${user.profilePic}">` : dName.charAt(0);
                        const isOnline = user.isOnline ? "active" : "";
                        
                        let badge = "";
                        if (dName.toLowerCase().includes("sobuj mia")) {
                            badge = ` <svg fill="#1877F2" viewBox="0 0 24 24" style="width: 14px; height: 14px;"><path d="M12.53 1.83c-.31-.22-.75-.22-1.06 0l-1.89 1.34c-.16.12-.37.16-.57.11l-2.26-.64c-.37-.1-.76.08-.91.43l-1.05 2.1c-.09.18-.26.3-.46.34l-2.31.42c-.38.07-.65.41-.61.79l.23 2.33c.02.2-.05.4-.18.55l-1.57 1.77c-.26.29-.26.73 0 1.02l1.57 1.77c.13.15.2.35.18.55l-.23 2.33c-.04.38.23.72.61.79l2.31.42c.2.04.37.16.46.34l1.05 2.1c.15.35.54.53.91.43l2.26-.64c.2-.05.41-.01.57.11l1.89 1.34c.31.22.75.22 1.06 0l1.89-1.34c.16-.12.37-.16.57-.11l2.26.64c.37.1.76-.08.91-.43l1.05-2.1c.09-.18.26-.3.46-.34l2.31-.42c.38-.07.65-.41.61-.79l-.23-2.33c-.02-.2.05-.4.18-.55l1.57-1.77c.26-.29.26-.73 0-1.02l-1.57-1.77c-.13-.15-.2-.35-.18-.55l.23-2.33c.04-.38-.23-.72-.61-.79l-2.31-.42c-.2-.04-.37-.16-.46-.34l-1.05-2.1c-.15-.35-.54-.53-.91-.43l-2.26.64c-.2.05-.41.01-.57-.11l-1.89-1.34z"/><path fill="#FFF" d="M10.13 15.65c-.24 0-.48-.09-.66-.27l-2.82-2.82c-.37-.37-.37-.96 0-1.33.37-.37.96-.37 1.33 0l2.15 2.15 5.56-5.56c.37-.37.96-.37 1.33 0 .37.37.37.96 0 1.33l-6.22 6.22c-.19.19-.43.28-.67.28z"/></svg>`;
                        }

                        // আনরিড মেসেজ চেক
                        const unreadCount = myUnreadData[userId] || 0;
                        const unreadHTML = unreadCount > 0 ? `<div style="background: #e41e3f; color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; justify-content: center; align-items: center; font-size: 12px; font-weight: bold; margin-left: auto;">${unreadCount}</div>` : '';
                        const nameStyle = unreadCount > 0 ? 'font-weight: 800; color: #ffffff;' : 'font-weight: 600; color: #e4e6eb;';
                        const lastMsgStyle = unreadCount > 0 ? 'font-weight: bold; color: #ffffff;' : 'color: #8c9e94;';
                        const lastMsgText = unreadCount > 0 ? 'নতুন মেসেজ এসেছে' : 'Click to chat';

                        const userHTML = `
                            <div class="user-item" onclick="openChat('${userId}', '${dName}', '${user.profilePic || ""}', ${user.isOnline})">
                                <div class="avatar-wrapper">
                                    <div class="chat-avatar">${avatar}</div>
                                    <div class="online-dot ${isOnline}"></div>
                                </div>
                                <div class="user-info">
                                    <div class="user-name" style="${nameStyle}">${dName}${badge}</div>
                                    <div class="last-msg" style="${lastMsgStyle}">${lastMsgText}</div>
                                </div>
                                ${unreadHTML}
                            </div>
                        `;
                        userListDiv.innerHTML += userHTML;
                    }
                });

                if (!hasOtherUsers) {
                    userListDiv.innerHTML = `<div style="padding: 40px 20px; text-align: center; color: #8c9e94; font-size: 16px;"><i class="fa-solid fa-users-slash" style="font-size: 50px; margin-bottom: 15px; color: #2ecc71; opacity: 0.5;"></i><br><b>আপনার ফ্রেন্ডলিস্ট ফাঁকা!</b><br><br>নতুন কেউ অ্যাকাউন্ট খুললে আপনি তাকে এখানে দেখতে পাবেন এবং চ্যাট করতে পারবেন।</div>`;
                }
            });
        }

        window.openChat = async (uid, name, photo, isOnline) => {
            activeChatUserId = uid;
            document.getElementById('activeChatName').innerText = name;
            document.getElementById('activeChatAvatar').innerHTML = photo ? `<img src="${photo}">` : name.charAt(0);
            
            const statusDot = document.getElementById('activeChatOnlineStatus');
            const statusText = document.getElementById('activeChatStatus');
            if(isOnline) { statusDot.classList.add('active'); statusText.innerText = "Active now"; statusText.style.color = "#2ecc71"; } 
            else { statusDot.classList.remove('active'); statusText.innerText = "Offline"; statusText.style.color = "#8c9e94"; }

            document.getElementById('chatBox').classList.add('active'); 
            loadMessages(uid);

            // চ্যাটে ঢুকলেই ওই ইউজারের আনরিড মেসেজ 0 হয়ে যাবে
            await setDoc(doc(db, "users", currentUser.uid), {
                unreadCounts: { [uid]: 0 }
            }, { merge: true });
        };

        document.getElementById('closeChatBtn').onclick = () => { document.getElementById('chatBox').classList.remove('active'); activeChatUserId = null; if(unsubscribeMessages) unsubscribeMessages(); };

        // মেসেজ সেন্ড করার পর আনরিড কাউন্ট বাড়বে
        document.getElementById('sendMessageBtn').onclick = async () => {
            const input = document.getElementById('messageInput'); const text = input.value;
            if(!text.trim() || !activeChatUserId) return;
            input.value = ""; 
            const chatId = currentUser.uid < activeChatUserId ? `${currentUser.uid}_${activeChatUserId}` : `${activeChatUserId}_${currentUser.uid}`;
            
            await addDoc(collection(db, "chats", chatId, "messages"), { senderId: currentUser.uid, text: text, imageUrl: null, timestamp: serverTimestamp() });
            
            // যার কাছে মেসেজ যাচ্ছে, তার আনরিড কাউন্ট +১ করে দেওয়া
            await setDoc(doc(db, "users", activeChatUserId), {
                unreadCounts: { [currentUser.uid]: increment(1) }
            }, { merge: true });
        };

        document.getElementById('chatImageUpload').addEventListener('change', async function(e) {
            if(e.target.files.length > 0 && activeChatUserId) {
                const file = e.target.files[0]; const statusText = document.getElementById('upload-status'); statusText.style.display = 'block'; statusText.innerText = "ছবি পাঠানো হচ্ছে...";
                const formData = new FormData(); formData.append("image", file); formData.append("key", IMGBB_API_KEY);
                try {
                    const response = await fetch("https://api.imgbb.com/1/upload", { method: "POST", body: formData });
                    const data = await response.json();
                    if(data.success) {
                        const imageUrl = data.data.display_url;
                        const chatId = currentUser.uid < activeChatUserId ? `${currentUser.uid}_${activeChatUserId}` : `${activeChatUserId}_${currentUser.uid}`;
                        await addDoc(collection(db, "chats", chatId, "messages"), { senderId: currentUser.uid, text: "📷 ছবি পাঠানো হয়েছে", imageUrl: imageUrl, timestamp: serverTimestamp() });
                        
                        await setDoc(doc(db, "users", activeChatUserId), {
                            unreadCounts: { [currentUser.uid]: increment(1) }
                        }, { merge: true });
                        
                        statusText.innerText = "ছবি পাঠানো সফল!";
                    }
                } catch (error) { statusText.innerText = "ছবি পাঠাতে সমস্যা হয়েছে!"; } finally { setTimeout(() => { statusText.style.display = 'none'; }, 2000); e.target.value = ""; }
            }
        });

        function loadMessages(otherUserId) {
            if(unsubscribeMessages) unsubscribeMessages(); 
            const chatId = currentUser.uid < otherUserId ? `${currentUser.uid}_${otherUserId}` : `${otherUserId}_${currentUser.uid}`;
            const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            unsubscribeMessages = onSnapshot(q, (snapshot) => {
                const msgContainer = document.getElementById('messagesContainer'); msgContainer.innerHTML = "";
                if(snapshot.empty) { msgContainer.innerHTML = `<div style="text-align: center; color: #8c9e94; margin-top: 50px;">এখনো কোনো কথা হয়নি। প্রথম মেসেজটি পাঠান!</div>`; return; }
                snapshot.forEach((doc) => {
                    const msg = doc.data(); const isMe = msg.senderId === currentUser.uid; const msgClass = isMe ? "msg-sent" : "msg-received";
                    let msgContent = msg.imageUrl ? `<img src="${msg.imageUrl}" class="msg-image" onclick="window.open('${msg.imageUrl}', '_blank')">` : msg.text;
                    msgContainer.innerHTML += `<div class="msg-bubble ${msgClass}">${msgContent}</div>`;
                });
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }
    </script>
</body>
</html>
